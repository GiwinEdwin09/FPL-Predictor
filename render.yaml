services:
  - name: fpl-predictor-api
    type: web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ADMIN_TOKEN
        sync: false
      - key: BOOTSTRAP_RUNTIME_ASSETS
        value: "0"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: DASHBOARD_CACHE_PATH
        value: /tmp/dashboard.json
      - key: REFRESH_RUNTIME_ASSETS_ON_STARTUP
        value: "0"
