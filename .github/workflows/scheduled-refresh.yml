name: Scheduled Refresh

on:
  schedule:
    - cron: "30 5,17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m pip install --no-deps -e .

      - name: Run refresh pipeline
        env:
          PYTHONPATH: src
        run: python scripts/run_refresh_pipeline.py

      - name: Commit refreshed artifacts
        run: |
          if git diff --quiet -- apps/web/public/data/dashboard.json; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data/dashboard.json
          git commit -m "chore: refresh dashboard payload"
          git push
